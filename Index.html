<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Form Login</title>
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .box {
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 300px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            display: block;
            text-align: left;
            margin-left: 5%;
            font-size: 14px;
            color: #555;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 5px auto 15px auto;
            display: block;
            border: 1px solid #ccc;
            border-radius: 8px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 5px rgba(102,126,234,0.5);
        }

        button {
            width: 90%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            cursor: pointer;
            display: block;
            margin: auto;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        #hasil {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }

        .sukses {
            color: green;
        }

        .gagal {
            color: red;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Login</h2>

    <label>Username</label>
    <input type="text" id="username" placeholder="Masukkan username">

    <label>Password</label>
    <input type="password" id="password" placeholder="Masukkan password">

    <button onclick="login()">Login</button>

    <p id="hasil"></p>
</div>

<script>
    var userBenar = "Intan Cantik";
    var passBenar = "082010";

    function login() {
        var user = document.getElementById("username").value;
        var pass = document.getElementById("password").value;
        var hasil = document.getElementById("hasil");

        if (user === userBenar && pass === passBenar) {
            hasil.innerHTML = "✅ Login Berhasil";
            hasil.className = "sukses";
        } else {
            hasil.innerHTML = "❌ Login Gagal";
            hasil.className = "gagal";
        }
    }
</script>

</body>
</html>
