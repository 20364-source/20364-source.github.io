<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>KALKULATOR INTAN</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffd6e8, #d6f6ff, #e8ddff);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  gap: 15px;
}

/* WRAPPER BIAR SEJAJAR */
.container {
  display: flex;
  gap: 15px;
  align-items: flex-start;
}

/* KALKULATOR */
.calculator {
  width: 340px;
  background: #fffafc;
  padding: 15px;
  border-radius: 22px;
  box-shadow: 0 15px 35px rgba(255, 182, 193, 0.4);
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.title {
  font-weight: 900;
  font-size: 18px;
  color: #ff69b4;
}

/* ICON */
.history-btn {
  width: 26px;
  height: 26px;
  font-size: 12px;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  background: #cdb4ff;
  color: white;
}

/* DISPLAY */
.display {
  width: 100%;
  height: 70px;
  font-size: 28px;
  text-align: right;
  padding: 12px;
  border-radius: 14px;
  border: 2px solid #ffd6e8;
  background: #fff0f6;
  color: #6a0572;
  margin-bottom: 10px;
  outline: none;
}

/* BUTTON GRID */
.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

button {
  height: 65px;
  font-size: 20px;
  border: none;
  border-radius: 16px;
  cursor: pointer;
}

button:not(.clear):not(.delete):not(.operator):not(.equal) {
  background: #ffe5ec;
  color: #6a0572;
}

.operator { background: #cdb4ff; color: white; }

.clear {
  grid-column: span 2;
  background: #ff9aa2;
  color: white;
  font-weight: 900;
}

.delete {
  grid-column: span 2;
  background: #a0c4ff;
  color: white;
  font-weight: 900;
}

.equal {
  background: #8ac926;
  color: white;
  font-weight: bold;
}

/* =========================
   DASHBOARD RIWAYAT SAMPING
========================= */
.history-panel {
  width: 220px;
  height: 420px;
  background: #ffffffcc;
  backdrop-filter: blur(6px);
  border-radius: 18px;
  padding: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  display: none;
  overflow-y: auto;
}

/* judul riwayat */
.history-title {
  font-weight: 900;
  color: #6a0572;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* tombol hapus */
.clear-history {
  background: #ff9aa2;
  border: none;
  color: white;
  padding: 4px 8px;
  border-radius: 8px;
  font-size: 11px;
  cursor: pointer;
}

/* item history */
.history-item {
  padding: 6px;
  border-bottom: 1px dashed #e0aaff;
  font-size: 14px;
  color: #6a0572;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

  <!-- KALKULATOR -->
  <div class="calculator">

    <div class="header">
      <div class="title">KALKULATOR INTAN</div>
      <button class="history-btn" onclick="toggleHistory()">🕒</button>
    </div>

    <input type="text" id="display" class="display" value="0">

    <div class="buttons">

      <button class="clear" onclick="clearDisplay()">CLEAR</button>
      <button class="delete" onclick="deleteLast()">DELETE</button>

      <button onclick="appendValue('7')">7</button>
      <button onclick="appendValue('8')">8</button>
      <button onclick="appendValue('9')">9</button>
      <button class="operator" onclick="appendValue('/')">÷</button>

      <button onclick="appendValue('4')">4</button>
      <button onclick="appendValue('5')">5</button>
      <button onclick="appendValue('6')">6</button>
      <button class="operator" onclick="appendValue('*')">×</button>

      <button onclick="appendValue('1')">1</button>
      <button onclick="appendValue('2')">2</button>
      <button onclick="appendValue('3')">3</button>
      <button class="operator" onclick="appendValue('-')">−</button>

      <button onclick="appendValue('.')">.</button>
      <button onclick="appendValue('0')">0</button>
      <button class="operator" onclick="appendValue('+')">+</button>
      <button class="equal" onclick="calculate()">=</button>

    </div>
  </div>

  <!-- RIWAYAT SAMPING -->
  <div id="historyPanel" class="history-panel">

    <div class="history-title">
      RIWAYAT
      <button class="clear-history" onclick="clearHistory()">Hapus</button>
    </div>

    <div id="historyList"></div>

  </div>

</div>

<script>
let display = document.getElementById("display");
let historyData = [];

/* input */
function appendValue(v) {
  if (display.value === "0") display.value = v;
  else display.value += v;
}

/* clear */
function clearDisplay() {
  display.value = "0";
}

/* delete */
function deleteLast() {
  if (display.value.length <= 1) display.value = "0";
  else display.value = display.value.slice(0, -1);
}

/* hitung */
function calculate() {
  try {
    let result = eval(display.value);
    historyData.push(display.value + " = " + result);
    display.value = result;
    renderHistory();
  } catch {
    display.value = "Error";
  }
}

/* toggle panel */
function toggleHistory() {
  let panel = document.getElementById("historyPanel");
  panel.style.display = (panel.style.display === "block") ? "none" : "block";
  renderHistory();
}

/* tampilkan history */
function renderHistory() {
  let list = document.getElementById("historyList");
  list.innerHTML = "";

  historyData.slice().reverse().forEach(item => {
    let div = document.createElement("div");
    div.className = "history-item";
    div.textContent = item;
    div.onclick = () => display.value = item.split("=")[0].trim();
    list.appendChild(div);
  });
}

/* hapus history */
function clearHistory() {
  historyData = [];
  renderHistory();
}
</script>

</body>
</html>
